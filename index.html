<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>黙朗</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: 'Noto Serif JP', serif;
    }

    .scene {
      position: absolute;
      inset: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
    }

    /* ===== シーン1：歩く視点 ===== */
    #scene-walk {
      background: #05050a;
      transition: transform 1.2s ease-in, filter 0.8s ease;
      transform-origin: center center;
      z-index: 1;
    }

    #ground {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 45%;
      background: linear-gradient(to top, #0d0d18 0%, transparent 100%);
    }

    .vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.85) 100%);
    }

    #snow-container { position: absolute; inset: 0; overflow: hidden; }
    .snowflake {
      position: absolute;
      top: -10px;
      color: #fff;
      animation-fill-mode: both;
      user-select: none;
    }
    @keyframes fall-a {
      0%   { transform: translateY(0)     translateX(0); }
      30%  { transform: translateY(30vh)  translateX(10px); }
      65%  { transform: translateY(65vh)  translateX(-7px); }
      100% { transform: translateY(110vh) translateX(6px); }
    }
    @keyframes fall-b {
      0%   { transform: translateY(0)     translateX(0); }
      25%  { transform: translateY(28vh)  translateX(-13px); }
      55%  { transform: translateY(58vh)  translateX(5px); }
      100% { transform: translateY(110vh) translateX(-8px); }
    }
    @keyframes fall-c {
      0%   { transform: translateY(0)     translateX(0); }
      40%  { transform: translateY(43vh)  translateX(7px); }
      70%  { transform: translateY(72vh)  translateX(-4px); }
      100% { transform: translateY(110vh) translateX(3px); }
    }

    /* ===== シーン2：イラスト切り替え ===== */
    #scene-pan {
      opacity: 0;
      z-index: 2;
      background: #000;
    }

    .illust-layer {
      position: absolute;
      inset: 0;
      opacity: 0;
      visibility: hidden;
      overflow: hidden;
    }
    .illust-layer img {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
    }
    .illust-layer::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to right, transparent 88%, rgba(0,0,0,0.7) 100%),
        linear-gradient(to left,  transparent 88%, rgba(0,0,0,0.7) 100%),
        radial-gradient(ellipse at center, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.8) 100%);
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      pointer-events: none;
    }

    /* ①少しパン */
    #illust-1 img {
      transform: scale(1.12) translateY(-8%);
      transition: transform 5s ease-out;
    }
    #illust-1.pan img { transform: scale(1.12) translateY(0%); }

    /* ②足元から頭へ */
    #illust-2 img {
      transform: scale(1.35) translateY(-18%);
      transition: transform 8s ease-out;
    }
    #illust-2.pan img { transform: scale(1.35) translateY(0%); }

    /* ③フクロウ：下から上へ微妙にパン */
    #illust-3 img {
      object-fit: cover;
      transform: scale(1.1) translateY(-8%);
      transition: transform 6s ease-out;
    }
    #illust-3.pan img { transform: scale(1.1) translateY(0%); }
    #illust-3::after {
      background:
        linear-gradient(to right, transparent 88%, rgba(0,0,0,0.7) 100%),
        linear-gradient(to left,  transparent 88%, rgba(0,0,0,0.7) 100%),
        linear-gradient(
          to bottom,
          rgba(0,0,0,1)    0%,
          rgba(0,0,0,0.75) 12%,
          rgba(0,0,0,0.2)  30%,
          rgba(0,0,0,0)    45%,
          rgba(0,0,0,0)    58%,
          rgba(0,0,0,0.2)  72%,
          rgba(0,0,0,0.75) 88%,
          rgba(0,0,0,1)    100%
        );
    }

    /* シェイク */
    @keyframes shake {
      0%, 100% { transform: translate(0, 0); }
      20%       { transform: translate(-6px, 4px); }
      40%       { transform: translate(5px, -3px); }
      60%       { transform: translate(-4px, 3px); }
      80%       { transform: translate(4px, -2px); }
    }
    .illust-layer.shake { animation: shake 0.6s ease-out forwards; }

    /* フクロウの雫 */
    #owl-tear {
      position: absolute;
      top: 55%; left: 50%;
      width: 3px; height: 8px;
      background: rgba(200, 220, 255, 0.6);
      border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
      opacity: 0;
      filter: blur(0.5px);
      z-index: 5;
      transition: opacity 0.3s ease;
    }

    /* ===== 「まだ、ここにいる。」 ===== */
    #final-text {
      position: absolute;
      inset: 0;
      z-index: 25;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 2.5s ease;
    }
    #final-text p {
      font-size: clamp(0.85rem, 2.5vw, 1.1rem);
      letter-spacing: 0.55em;
      color: rgba(200, 148, 58, 0.85);
      text-shadow: 0 0 30px rgba(200, 148, 58, 0.3);
    }

    /* ===== 全画面フェード ===== */
    #fadeout {
      position: absolute;
      inset: 0;
      background: #000;
      opacity: 1;
      pointer-events: none;
      z-index: 20;
      transition: opacity 1.2s ease;
    }

    /* ===== スキップ ===== */
    #skip {
      position: absolute;
      bottom: 1.8rem; right: 2rem;
      color: rgba(255,255,255,0.38);
      font-size: 0.62rem;
      letter-spacing: 0.4em;
      cursor: pointer;
      z-index: 30;
      transition: color 0.3s;
      pointer-events: all;
    }
    #skip:hover { color: rgba(255,255,255,0.5); }

    /* ===== タップヒント ===== */
    #tap-hint {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(255,255,255,0.28);
      font-size: 0.62rem;
      letter-spacing: 0.5em;
      white-space: nowrap;
      animation: pulse 2s ease-in-out infinite;
      z-index: 30;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.18; }
      50%       { opacity: 0.45; }
    }
  </style>
</head>
<body>

  <!-- シーン1：歩く視点 -->
  <div id="scene-walk" class="scene">
    <div id="ground"></div>
    <div class="vignette"></div>
  </div>

  <!-- 雪レイヤー（全シーンに重なる） -->
  <div id="snow-container" style="position:absolute;inset:0;z-index:19;overflow:hidden;pointer-events:none;"></div>

  <!-- シネマ黒帯 -->
  <div id="letterbox-top"    style="position:absolute;top:0;left:0;right:0;height:12%;background:#000;z-index:18;opacity:0;transition:opacity 1s ease;pointer-events:none;"></div>
  <div id="letterbox-bottom" style="position:absolute;bottom:0;left:0;right:0;height:12%;background:#000;z-index:18;opacity:0;transition:opacity 1s ease;pointer-events:none;"></div>

  <!-- シーン2：イラスト切り替え -->
  <div id="scene-pan" class="scene">
    <div id="illust-1" class="illust-layer">
      <img src="images/hp01足跡血_ゆきなし.png" alt="">
    </div>
    <div id="illust-2" class="illust-layer">
      <img src="images/hp02女の子.png" alt="">
    </div>
    <div id="illust-3" class="illust-layer">
      <img src="images/hp03ふくろう.png" alt="">
    </div>
    <div id="owl-tear"></div>
  </div>

  <div id="final-text"><p>まだ、ここにいる。</p></div>
  <div id="fadeout"></div>

  <p id="tap-hint">— touch to begin —</p>
  <p id="skip">skip →</p>

  <script>
    // オープニング再生済みチェック（?play=1 で強制再生）
    const params = new URLSearchParams(window.location.search);
    const forcePlay = params.get('play') === '1';
    if (!forcePlay && localStorage.getItem('mokurou_opening_seen') === '1') {
      window.location.replace('main.html');
    }

    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let ctx;
    let started = false;

    async function loadSound(path) {
      const res = await fetch(path);
      const arr = await res.arrayBuffer();
      return await ctx.decodeAudioData(arr);
    }

    function playSound(buffer, options = {}) {
      const source = ctx.createBufferSource();
      source.buffer = buffer;
      source.playbackRate.value = options.playbackRate ?? 1.0;
      let node = source;
      if (options.lowpass) {
        const f = ctx.createBiquadFilter();
        f.type = 'lowpass'; f.frequency.value = options.lowpass;
        source.connect(f); node = f;
      }
      if (options.highpass) {
        const f = ctx.createBiquadFilter();
        f.type = 'highpass'; f.frequency.value = options.highpass;
        node.connect(f); node = f;
      }
      const gain = ctx.createGain();
      if (options.fadeIn) {
        gain.gain.setValueAtTime(0, ctx.currentTime);
        gain.gain.linearRampToValueAtTime(options.volume ?? 1.0, ctx.currentTime + options.fadeIn);
      } else {
        gain.gain.value = options.volume ?? 1.0;
      }
      node.connect(gain);
      gain.connect(ctx.destination);
      if (options.tremolo) {
        const rate = options.tremolo.rate ?? 2.5;
        const depth = options.tremolo.depth ?? 0.08;
        const base = options.volume ?? 1.0;
        let phase = 0;
        const tid = setInterval(() => {
          phase += (rate * 2 * Math.PI) / 60;
          gain.gain.value = base + Math.sin(phase) * depth;
        }, 1000 / 60);
        source.onended = () => clearInterval(tid);
      }
      source.start(0, options.startOffset ?? 0);
      return { source, gain };
    }

    function createSnow(count) {
      const container = document.getElementById('snow-container');
      const chars = ['❄', '❅', '·', '•', '˚'];
      const anims = ['fall-a', 'fall-b', 'fall-c'];
      const sizes = [0.18, 0.22, 0.28, 0.38, 0.5, 0.7, 1.0, 1.4];
      for (let i = 0; i < count; i++) {
        const f = document.createElement('span');
        f.className = 'snowflake';
        f.textContent = chars[Math.floor(Math.random() * chars.length)];
        f.style.left = Math.random() * 100 + 'vw';
        f.style.fontSize = sizes[Math.floor(Math.random() * sizes.length)] + 'em';
        f.style.opacity = (Math.random() * 0.45 + 0.15).toFixed(2);
        f.style.animationName = anims[Math.floor(Math.random() * anims.length)];
        f.style.animationDuration = (Math.random() * 10 + 8) + 's';
        f.style.animationDelay = '-' + (Math.random() * 12).toFixed(1) + 's';
        f.style.animationTimingFunction = 'linear';
        f.style.animationIterationCount = 'infinite';
        if (Math.random() < 0.3) {
          f.style.filter = 'blur(' + (Math.random() * 1.2 + 0.3).toFixed(1) + 'px)';
        }
        container.appendChild(f);
      }
    }

    const fade = document.getElementById('fadeout');

    function fadeIn(ms) {
      fade.style.transition = `opacity ${ms / 1000}s ease`;
      fade.style.opacity = '1';
    }
    function fadeOut(ms) {
      fade.style.transition = `opacity ${ms / 1000}s ease`;
      fade.style.opacity = '0';
    }

    function showLayer(id, withPan) {
      const layer = document.getElementById(id);
      layer.style.visibility = 'visible';
      layer.style.opacity = '1';
      if (withPan) {
        requestAnimationFrame(() => requestAnimationFrame(() => layer.classList.add('pan')));
      }
    }
    function hideLayer(id) {
      const layer = document.getElementById(id);
      layer.style.opacity = '0';
      layer.style.visibility = 'hidden';
    }

    // 暗転してレイヤー切り替えて明転
    function switchLayer(hideId, showId, withPan, fadeDuration, callback) {
      fadeIn(fadeDuration);
      setTimeout(() => {
        if (hideId) hideLayer(hideId);
        if (showId) showLayer(showId, withPan);
        fadeOut(fadeDuration);
        if (callback) setTimeout(callback, fadeDuration);
      }, fadeDuration);
    }

    function showFinalText(onDone) {
      const ft = document.getElementById('final-text');
      ft.style.opacity = '1';
      setTimeout(onDone, 3500);
    }
    function goToMain() {
      document.getElementById('final-text').style.opacity = '0';
      setTimeout(() => {
        fadeIn(2500);
        setTimeout(() => {
          localStorage.setItem('mokurou_opening_seen', '1');
          window.location.href = 'main.html';
        }, 2800);
      }, 800);
    }

    async function runOpening() {
      if (started) return;
      started = true;
      document.getElementById('tap-hint').style.display = 'none';

      ctx = new AudioCtx();
      let snowBuf = null, owlBuf = null;
      try {
        [snowBuf, owlBuf] = await Promise.all([
          loadSound('sounds/雪の上を歩く1.mp3'),
          loadSound('sounds/フクロウの鳴き声.mp3'),
        ]);
      } catch(e) {}

      // ホウのタイミング（playbackRate 0.88 換算）
      const owlRate   = 0.88;
      const hoot1Real = Math.round(2000 / owlRate);  // ファイル2s → 実時間 ~2270ms
      const hoot2Real = Math.round(7000 / owlRate);  // ファイル7s → 実時間 ~7955ms

      const girlFadeAt = 16900;               // 女の子フェードアウト開始
      const owlStart   = girlFadeAt - hoot1Real;  // フクロウ声スタート（ホウ1回目の2270ms前）
      const owlFadeAt  = girlFadeAt + 3600;  // 遷移1600ms + フクロウ表示2s（ホウ2回目は暗転後に鳴る）

      const sceneWalk = document.getElementById('scene-walk');
      const scenePan  = document.getElementById('scene-pan');

      // 0s ── 足音スタート（暗いまま）
      createSnow(45);
      scenePan.style.opacity = '1'; // fadeout の下なので最初は見えない
      let snowSrc = null, snowGain = null;
      if (snowBuf) {
        ({ source: snowSrc, gain: snowGain } = playSound(snowBuf, {
          playbackRate: 0.58, volume: 0.54, fadeIn: 2.5,
        }));
      }

      // 2s ── ゆっくり明転（6秒かけて透明化、8sに完全透明＝ドサッのピーク）
      setTimeout(() => fadeOut(6000), 2000);

      // 4s ── illust-1 を4秒かけてじわっと浮かび上がらせる
      //        fadeout の透明化と合わさり、5s頃からぼんやり→8sにピーク
      setTimeout(() => {
        const layer1 = document.getElementById('illust-1');
        layer1.style.visibility = 'visible';
        layer1.style.transition = 'opacity 4s ease-in';
        layer1.style.opacity = '1';
        setTimeout(() => layer1.classList.add('pan'), 100);
        document.getElementById('letterbox-top').style.opacity = '1';
        document.getElementById('letterbox-bottom').style.opacity = '1';
      }, 4000);

      // 7s ── 足音リタルダンド
      setTimeout(() => {
        if (!snowSrc) return;
        const now = ctx.currentTime;
        snowSrc.playbackRate.setValueAtTime(0.58, now);
        snowSrc.playbackRate.linearRampToValueAtTime(0.28, now + 2.5);
        snowGain.gain.setValueAtTime(0.54, now);
        snowGain.gain.linearRampToValueAtTime(0, now + 3.0);
      }, 7000);

      // 8s ── 景色が傾く
      setTimeout(() => {
        sceneWalk.style.transform = 'rotate(-15deg) translateY(-8%)';
        sceneWalk.style.filter    = 'blur(2px)';
      }, 8000);

      // 8.3s ── 暗転（ドサッ直後）
      setTimeout(() => fadeIn(900), 8300);

      // 11.5s ── illust-1→2（女の子へ、無音の中）
      setTimeout(() => {
        switchLayer('illust-1', 'illust-2', true, 700, null);
      }, 11500);

      // owlStart ── フクロウ声スタート（女の子表示中・音源冒頭の無音が流れる）
      setTimeout(() => {
        if (owlBuf) {
          playSound(owlBuf, {
            playbackRate: owlRate, volume: 0.46,
            highpass: 150,
            tremolo: { rate: 2.5, depth: 0.07 },
          });
        }
      }, owlStart);

      // girlFadeAt ── 女の子フェードアウト（ホウ1回目と同時）
      setTimeout(() => {
        fadeIn(800);
        setTimeout(() => {
          hideLayer('illust-2');
          showLayer('illust-3', true);
          fadeOut(800);
        }, 800);
      }, girlFadeAt);

      // owlFadeAt ── フクロウフェードアウト（ホウ2回目と同時）
      setTimeout(() => {
        fadeIn(1000);
        setTimeout(() => {
          hideLayer('illust-3');
          document.getElementById('letterbox-top').style.opacity = '0';
          document.getElementById('letterbox-bottom').style.opacity = '0';
          fadeOut(2000);
          setTimeout(() => {
            document.getElementById('final-text').style.opacity = '1';
            setTimeout(() => {
              fadeIn(2500);
              setTimeout(() => {
                localStorage.setItem('mokurou_opening_seen', '1');
                window.location.href = 'main.html';
              }, 2800);
            }, 3500);
          }, 2000);
        }, 1000);
      }, owlFadeAt);
    }

    document.getElementById('skip').addEventListener('click', () => {
      localStorage.setItem('mokurou_opening_seen', '1');
      window.location.href = 'main.html';
    });
    document.body.addEventListener('click', () => runOpening(), { once: true });
  </script>
</body>
</html>
